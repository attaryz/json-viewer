<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Viewer</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/tree-view.css">
    <link rel="stylesheet" href="css/table-view.css">
    <link rel="stylesheet" href="css/diagram-view.css">
</head>
<body>
    <div class="header">
        <h1>JSON Viewer</h1>
        <label for="file-input" class="btn">Load File</label>
        <input type="file" id="file-input" accept=".json,.txt">
        <button class="btn btn-secondary" onclick="formatJSON()">Format</button>
        <button class="btn btn-secondary" onclick="minifyJSON()">Minify</button>
        <button class="btn btn-secondary" onclick="copyToClipboard()">Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        <input type="text" class="search-box" id="search-input" placeholder="Search..." oninput="searchJSON()">
        <div class="view-tabs">
            <button class="btn active" id="btn-tree" onclick="switchView('tree')">Tree</button>
            <button class="btn btn-secondary" id="btn-table" onclick="switchView('table')">Table</button>
            <button class="btn btn-secondary" id="btn-diagram" onclick="switchView('diagram')">Diagram</button>
        </div>
    </div>

    <div class="main">
        <div class="input-panel">
            <div class="panel-header">Input</div>
            <textarea id="json-input" placeholder="Paste your JSON here..."></textarea>
        </div>
        <div class="output-panel">
            <div class="panel-header" id="output-header">
                <span>Tree View</span>
            </div>
            <div class="table-selector" id="table-selector" style="display: none;">
                <label>Select array/object to view:</label>
                <select id="table-path" onchange="renderTableForPath(this.value)">
                    <option value="">-- Select a path --</option>
                </select>
            </div>
            <div class="diagram-controls" id="diagram-controls" style="display: none;">
                <label>Diagram Type:</label>
                <select id="diagram-type" onchange="renderDiagram()">
                    <option value="tree">Tree Hierarchy</option>
                    <option value="entity">Entity Relationship</option>
                    <option value="mindmap">Mind Map</option>
                </select>
            </div>
            <div class="output-content" id="json-output"></div>
        </div>
    </div>

    <div class="stats" id="stats">Ready</div>

    <!-- JavaScript Modules -->
    <script src="js/tree-view.js"></script>
    <script src="js/table-view.js"></script>
    <script src="js/diagram-view.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
