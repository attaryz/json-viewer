<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Viewer</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsonpath-plus@7/dist/index-umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jmespath@0.16.0/jmespath.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/json-source-map@0.6.1/dist/index.min.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="font-sans bg-bg-main text-text-main h-screen flex flex-col m-0 p-0 box-border">
    <header class="header bg-bg-panel px-4 py-2 border-b border-border flex items-center justify-between shrink-0 flex-wrap gap-y-2">
        <div class="flex items-center gap-4">
            <div class="flex flex-col">
                <h1 class="text-[15px] font-bold text-white flex items-center gap-2 tracking-wide leading-tight"><i data-lucide="file-json-2" class="w-5 h-5 text-brand-blue"></i> JSON Viewer</h1>
            </div>
            
            <div class="h-6 w-px bg-border hidden sm:block"></div>
            
            <!-- File & Edit Actions -->
            <div class="flex items-center gap-1">
                <label for="file-input" class="group relative cursor-pointer text-text-muted hover:text-white hover:bg-white/5 py-1.5 px-2.5 rounded text-[13px] transition-colors flex items-center gap-1.5"><i data-lucide="folder-open" class="w-4 h-4"></i> <span class="hidden sm:inline">Open</span>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Open File</span>
                </label>
                <input type="file" id="file-input" accept=".json,.txt" class="hidden">
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 py-1.5 px-2.5 rounded text-[13px] transition-colors flex items-center gap-1.5" onclick="downloadJSON()"><i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">Save</span>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Save JSON File</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="undoInput()"><i data-lucide="undo" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Undo</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="redoInput()"><i data-lucide="redo" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Redo</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="copyToClipboard()"><i data-lucide="copy" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Copy to Clipboard</span>
                </button>
                <button class="group relative text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 p-1.5 rounded transition-colors" onclick="clearAll()"><i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Clear All</span>
                </button>
            </div>

            <div class="h-6 w-px bg-border hidden md:block"></div>

            <!-- Process Actions -->
            <div class="flex items-center gap-1">
                <button class="group relative text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 py-1.5 px-2.5 rounded text-[13px] transition-colors flex items-center gap-1.5 font-medium" onclick="renderNow()"><i data-lucide="play" class="w-4 h-4 text-emerald-500"></i> <span class="hidden md:inline">Render</span>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Render JSON</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="formatJSON()"><i data-lucide="wand-2" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Format JSON</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="minifyJSON()"><i data-lucide="minimize-2" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Minify JSON</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" onclick="validateSchema()"><i data-lucide="check-circle" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Validate Schema</span>
                </button>
                <button class="group relative text-text-muted hover:text-white hover:bg-white/5 p-1.5 rounded transition-colors" id="large-mode-toggle" onclick="toggleLargeMode()"><i data-lucide="maximize" class="w-4 h-4"></i>
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Toggle Large Mode</span>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-4 ml-auto">
            <!-- Search -->
            <div class="flex items-center">
                <div class="relative flex items-center">
                    <i data-lucide="search" class="w-4 h-4 absolute left-2.5 text-text-muted pointer-events-none"></i>
                    <input type="text" class="bg-bg-input border border-border-input text-text-main py-1.5 pl-8 pr-3 rounded-l text-[13px] w-[180px] focus:outline-none focus:border-brand-blue transition-colors placeholder:text-text-muted/50" id="search-input" placeholder="Search..." oninput="searchJSON()" onkeydown="searchKeydown(event)">
                </div>
                <div class="flex bg-bg-input border-y border-r border-border-input rounded-r">
                    <button class="group relative text-text-muted hover:text-white hover:bg-white/10 p-1.5 transition-colors" onclick="prevSearchMatch()"><i data-lucide="chevron-up" class="w-4 h-4"></i>
                        <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Previous Match</span>
                    </button>
                    <button class="group relative text-text-muted hover:text-white hover:bg-white/10 p-1.5 rounded-r transition-colors border-l border-border-input" onclick="nextSearchMatch()"><i data-lucide="chevron-down" class="w-4 h-4"></i>
                        <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Next Match</span>
                    </button>
                </div>
            </div>

            <!-- View Tabs -->
            <div class="flex gap-1 bg-black/20 p-1 rounded-lg border border-border/50 shadow-inner">
                <button class="group relative btn active bg-brand-blue shadow text-white py-1.5 px-3 rounded text-[13px] transition-colors flex items-center gap-1.5" id="btn-tree" onclick="switchView('tree')"><i data-lucide="folder-tree" class="w-4 h-4"></i> Tree
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Tree View</span>
                </button>
                <button class="group relative btn btn-secondary text-text-muted hover:text-white hover:bg-white/5 py-1.5 px-3 rounded text-[13px] transition-colors flex items-center gap-1.5" id="btn-table" onclick="switchView('table')"><i data-lucide="table" class="w-4 h-4"></i> Table
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Table View</span>
                </button>
                <button class="group relative btn btn-secondary text-text-muted hover:text-white hover:bg-white/5 py-1.5 px-3 rounded text-[13px] transition-colors flex items-center gap-1.5" id="btn-diagram" onclick="switchView('diagram')"><i data-lucide="network" class="w-4 h-4"></i> Diagram
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Diagram View</span>
                </button>
                <button class="group relative btn btn-secondary text-text-muted hover:text-white hover:bg-white/5 py-1.5 px-3 rounded text-[13px] transition-colors flex items-center gap-1.5" id="btn-diff" onclick="switchView('diff')"><i data-lucide="split-square-horizontal" class="w-4 h-4"></i> Diff
                    <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-gray-300 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-gray-700 shadow-xl">Diff Viewer</span>
                </button>
            </div>
        </div>
    </header>

    <div class="main flex flex-1 min-h-0 overflow-hidden">
        <div class="input-panel flex flex-col flex-1 min-w-[200px] border-r border-border" id="input-panel">
            <div class="panel-header bg-bg-panel px-[15px] py-2.5 text-xs uppercase text-text-muted border-b border-border flex justify-between items-center">Input</div>
            <div id="json-input" class="flex-1 overflow-hidden border-none text-[13px] leading-relaxed *:!h-full"></div>
            <div class="panel-header panel-subheader bg-bg-panel px-[15px] py-2.5 text-xs uppercase text-text-muted border-y border-border flex justify-between items-center" id="compare-header" style="display:none;">Compare</div>
            <div id="json-compare" class="h-[160px] overflow-hidden border-none text-[13px] leading-relaxed *:!h-full" style="display:none;"></div>
            <div class="panel-header panel-subheader bg-bg-panel px-[15px] py-2.5 text-xs uppercase text-text-muted border-y border-border flex justify-between items-center" id="schema-header" style="display:none;">Schema</div>
            <div id="json-schema" class="h-[160px] overflow-hidden border-none text-[13px] leading-relaxed *:!h-full" style="display:none;"></div>
        </div>
        <div class="panel-resizer w-1.5 cursor-col-resize bg-[#2a2a2a] hover:bg-[#3a3a3a] border-x border-border" id="panel-resizer" title="Drag to resize"></div>
        <div class="output-panel flex flex-col flex-1 min-w-[200px]" id="output-panel">
            <div class="panel-header bg-bg-panel px-[15px] py-2.5 text-xs uppercase text-text-muted border-b border-border flex justify-between items-center" id="output-header">
                <span>Tree View</span>
            </div>
            <div class="path-bar bg-bg-panel border-b border-border px-[15px] py-2 flex items-center gap-2 flex-wrap text-xs text-text-muted" id="path-bar" style="display:none;">
                <span class="path-label">Path:</span>
                <span class="path-value text-text-main font-mono" id="current-path">root</span>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="copyPath()">Copy Path</button>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="copyPointer()">Copy Pointer</button>
                <input type="text" id="bookmark-name" placeholder="Bookmark name..." class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[160px]">
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="addBookmark()">Add</button>
                <select id="bookmark-select" onchange="jumpToBookmark(this.value)" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[220px]">
                    <option value="">Jump to bookmark...</option>
                </select>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="removeBookmark()">Remove</button>
            </div>
            <div class="tree-controls bg-bg-panel border-b border-border px-[15px] py-2 flex items-center gap-2 flex-wrap text-xs text-text-muted" id="tree-controls" style="display:none;">
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="expandAll()">Expand All</button>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="collapseAll()">Collapse All</button>
                <label>Depth</label>
                <input type="range" id="tree-depth" min="1" max="12" value="6" oninput="setTreeDepth(this.value)" class="w-[140px] bg-bg-input border border-border-input rounded text-xs">
                <span id="tree-depth-value">6</span>
            </div>
            <div class="table-selector bg-bg-panel border-b border-border px-[15px] py-2 flex items-center gap-2.5" id="table-selector" style="display: none;">
                <label class="text-xs text-text-muted">Select array/object to view:</label>
                <select id="table-path" onchange="renderTableForPath(this.value)" class="flex-1 bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="">-- Select a path --</option>
                </select>
                <input type="text" id="table-search" placeholder="Filter rows..." oninput="filterTableRows(this.value)" class="w-[180px] bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="exportTableCSV()">Export CSV</button>
            </div>
            <div class="diagram-controls bg-bg-panel border-b border-border px-[15px] py-2 flex items-center gap-2.5 flex-wrap" id="diagram-controls" style="display: none;">
                <label class="text-xs text-text-muted">Diagram Type:</label>
                <select id="diagram-type" onchange="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="tree">Tree Hierarchy</option>
                    <option value="entity">Entity Relationship</option>
                    <option value="mindmap">Mind Map</option>
                </select>
                <label class="text-xs text-text-muted">Layout</label>
                <select id="diagram-layout" onchange="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="LR">Left to Right</option>
                    <option value="TD">Top Down</option>
                </select>
                <label class="text-xs text-text-muted">Depth</label>
                <input type="range" id="diagram-depth" min="1" max="12" value="6" oninput="renderDiagram()" class="w-[120px] bg-bg-input border border-border-input rounded text-xs">
                <span id="diagram-depth-value" class="text-xs text-text-muted">6</span>
                <label class="text-xs text-text-muted">Max Nodes</label>
                <input type="number" id="diagram-max-nodes" min="50" max="2000" value="400" oninput="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[80px]">
                <label class="text-xs text-text-muted">Include Keys</label>
                <input type="text" id="diagram-include" placeholder="a,b,c" oninput="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[120px]">
                <label class="text-xs text-text-muted">Exclude Keys</label>
                <input type="text" id="diagram-exclude" placeholder="x,y,z" oninput="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[120px]">
                <label class="text-xs text-text-muted">Theme</label>
                <select id="diagram-theme" onchange="renderDiagram()" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="dark">Dark</option>
                    <option value="neutral">Neutral</option>
                </select>
                <label class="text-xs text-text-muted">Search</label>
                <input type="text" id="diagram-search" placeholder="Find node text" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs w-[120px]">
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="highlightDiagram()">Highlight</button>
                <label class="text-xs text-text-muted">PNG Scale</label>
                <select id="diagram-scale" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="3">3x</option>
                </select>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="exportDiagramSVG()">Export SVG</button>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="exportDiagramPNG()">Export PNG</button>
            </div>
            <div class="query-bar bg-bg-panel border-b border-border px-[15px] py-2 flex items-center gap-2 flex-wrap text-xs text-text-muted" id="query-bar" style="display:none;">
                <label>Query</label>
                <select id="query-language" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs">
                    <option value="jsonpath">JSONPath</option>
                    <option value="jmespath">JMESPath</option>
                    <option value="js">JavaScript</option>
                </select>
                <input type="text" id="query-input" placeholder="$.store.book[?@.price < 10]" class="bg-bg-input border border-border-input text-text-main py-1 px-2 rounded text-xs flex-1 min-w-[300px]">
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="runQuery()">Run</button>
                <button class="btn btn-small btn-secondary bg-bg-input hover:bg-bg-input-hover text-white py-1 px-2 rounded text-[11px] transition-colors" onclick="clearQuery()">Clear</button>
            </div>
            <div class="validation-bar bg-bg-panel border-b border-border py-2 px-[15px] text-xs" id="validation-bar" style="display:none;"></div>
            <div class="query-results bg-bg-main border-b border-border py-2.5 px-[15px] whitespace-pre-wrap font-mono text-xs text-text-main" id="query-results" style="display:none;"></div>
            <div class="output-content flex-1 max-h-full overflow-auto p-[15px] font-mono text-[13px] leading-relaxed relative" id="json-output"></div>
        </div>
    </div>

    <div class="stats bg-bg-panel border-t border-border px-[15px] py-2 text-xs text-text-muted" id="stats">Ready</div>

    <!-- JavaScript Modules -->
    <script type="module" src="/src/app.ts"></script>
</body>
</html>
